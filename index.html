    <style>
        /* -------------------------------------------
           Atomic Search Hero Layout 
        -------------------------------------------- */
        .hero {
            position: relative; /* Added to contain absolute SVGs */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 85vh;
            width: 100%;
            padding: 2rem 1rem;
            box-sizing: border-box;
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            overflow: hidden;
        }

        .atomic-search-container {
            position: relative;
            z-index: 10; /* Ensures the search box stays on top of SVGs */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.5rem; 
            width: 100%;
            max-width: 850px; 
            margin: 0 auto;
        }

        .atomic-logo-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%; /* Let the wrapper take the full container width */
            padding: 0 1rem;
            box-sizing: border-box;
        }

        .atomic-logo {
            display: block;
            width: 100%; /* Fill the wrapper up to the max-width */
            max-width: 300px; /* Adjust this value if you want it slightly bigger or smaller on desktop */
            height: auto;
            object-fit: contain;
        }

        .atomic-search-bar {
            display: flex;
            align-items: center;
            width: 100%;
            height: 80px; 
            background: var(--white);
            border: 5px solid var(--border); 
            border-radius: 12px;
            box-shadow: 8px 8px 0 var(--border);
            overflow: hidden;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .atomic-search-bar:focus-within {
            transform: translate(-3px, -3px);
            box-shadow: 11px 11px 0 var(--border);
        }

        .search-icon-box {
            width: 80px; 
            height: 100%;
            background: var(--yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 5px solid var(--border);
            font-size: 1.8rem; 
            color: var(--text);
            flex-shrink: 0;
        }

        .search-input {
            flex: 1;
            height: 100%;
            border: none;
            background: transparent;
            padding: 0 1.5rem;
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem; 
            font-weight: 600;
            color: var(--text);
            outline: none;
            width: 100%;
        }

        .search-input::placeholder {
            color: var(--text);
            opacity: 0.4;
            font-weight: 500;
        }

        .search-input::-webkit-input-placeholder { color: var(--text); opacity: 0.4; }
        .search-input::-moz-placeholder { color: var(--text); opacity: 0.4; }

        .atomic-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            width: 100%;
        }

        .btn-atomic {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem 1.5rem; 
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1.25rem; 
            border: 5px solid var(--border); 
            border-radius: 10px;
            box-shadow: 6px 6px 0 var(--border);
            cursor: pointer;
            transition: all 0.15s ease;
            flex: 1;
            max-width: 300px; 
            white-space: nowrap;
        }

        .btn-yellow { background: var(--yellow); }
        .btn-cyan { background: var(--cyan); }

        .btn-atomic:hover {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0 var(--border);
        }

        .btn-atomic:active {
            transform: translate(6px, 6px);
            box-shadow: 0 0 0 var(--border);
        }

        /* -------------------------------------------
           NEW: Floating Background SVGs
        -------------------------------------------- */
        .hero-decorations {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through */
            z-index: 1; /* Sits behind the search container (z-index: 10) */
            overflow: hidden;
        }

        .deco-code, .deco-terminal, .deco-floppy {
            position: absolute;
            opacity: 0.75;
        }

        .deco-code {
            top: 15%;
            left: 12%;
            animation: floatSvg1 6s ease-in-out infinite;
        }

        .deco-terminal {
            top: 25%;
            right: 12%;
            animation: floatSvg2 7s ease-in-out infinite reverse;
        }

        .deco-floppy {
            bottom: 15%;
            left: 20%;
            animation: floatSvg3 8s ease-in-out infinite;
        }

        @keyframes floatSvg1 {
            0%, 100% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-20px) rotate(-5deg); }
        }

        @keyframes floatSvg2 {
            0%, 100% { transform: translateY(0) rotate(15deg); }
            50% { transform: translateY(-25px) rotate(20deg); }
        }

        @keyframes floatSvg3 {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(-10deg); }
        }

        /* -------------------------------------------
           Search Results Container
        -------------------------------------------- */
        .search-results-container {
            width: 100%;
            max-width: 700px;
            margin-top: 1rem;
            display: none; 
            text-align: left;
        }

        /* -------------------------------------------
           Retro Loading Dialog Window
        -------------------------------------------- */
        .retro-loader-window {
            border: 5px solid var(--border);
            border-radius: 10px;
            background: #fdf6e3; 
            box-shadow: 10px 10px 0 var(--border);
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .retro-header {
            background: #FFD93D; 
            color: var(--text);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid var(--border);
            font-size: 1.4rem;
            font-weight: 600;
        }

        .retro-controls {
            display: flex;
            gap: 12px;
            font-size: 1.2rem;
        }

        .retro-body {
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .retro-body::after {
            content: '';
            position: absolute;
            right: 10px;
            top: 20px;
            bottom: 20px;
            width: 15px;
            background: repeating-linear-gradient(
                -45deg,
                var(--border),
                var(--border) 2px,
                transparent 2px,
                transparent 8px
            );
            opacity: 0.5;
        }

        .retro-bar-container {
            border: 3px solid var(--border);
            border-radius: 6px;
            width: 90%;
            height: 38px;
            padding: 4px;
            display: flex;
            gap: 4px;
            background: #fff;
            margin-bottom: 2rem;
            margin-right: 25px; 
        }

        .retro-segment {
            background: #FFD93D;
            flex: 1;
            opacity: 0; 
            border-radius: 2px;
        }

        .retro-cancel {
            border: 3px solid var(--border);
            background: #fdf6e3;
            padding: 0.5rem 2rem;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--border);
            transition: all 0.1s ease;
            margin-right: 25px;
        }

        .retro-cancel:active {
            box-shadow: 0 0 0 var(--border);
            transform: translate(3px, 3px);
        }

        /* -------------------------------------------
           Attractive Search Result Card
        -------------------------------------------- */
        .attractive-card {
            background: #fff;
            border: 5px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 10px 10px 0 var(--border);
            position: relative;
            animation: slideUpFade 0.4s ease forwards;
            background-image: radial-gradient(rgba(0,0,0,0.1) 2px, transparent 2px);
            background-size: 20px 20px;
        }

        .attractive-card-inner {
            background: #fff;
            border: 3px solid var(--border);
            padding: 2rem;
            border-radius: 8px;
        }

        .card-badges {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .card-badge {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            border: 2px solid var(--border);
        }

        .badge-verified { background: var(--yellow); }
        .badge-error { background: #ff5555; color: white; }
        .badge-outline { background: transparent; border-style: dashed; }

        .attractive-card h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 0.75rem;
            color: var(--text);
            text-transform: uppercase;
        }

        .attractive-card p {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            color: var(--text);
            line-height: 1.5;
        }

        .card-metadata {
            display: flex;
            gap: 20px;
            font-family: 'Space Mono', monospace;
            font-size: 0.95rem;
            font-weight: bold;
            border-top: 2px dashed var(--border);
            padding-top: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .btn-launch {
            width: 100%;
            max-width: none;
            justify-content: space-between;
            font-size: 1.2rem;
            padding: 1.2rem;
        }

        /* -------------------------------------------
           Modal Overlay Styles 
        -------------------------------------------- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none; 
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--bg);
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            border: 5px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 90%;
            max-width: 450px;
            box-shadow: 12px 12px 0 var(--border);
            text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .modal-content h3 { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; margin-top: 0; margin-bottom: 1rem; color: var(--text);}
        .modal-content p { font-family: 'Space Mono', monospace; font-size: 1.1rem; margin-bottom: 2rem; color: var(--text); font-weight: 600; line-height: 1.5;}
        .modal-buttons { display: flex; flex-direction: column; gap: 1rem; }
        .modal-buttons .btn-atomic { width: 100%; max-width: 100%; text-decoration: none; }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* -------------------------------------------
           Promo Placements (Responsive Edge-to-Edge)
        -------------------------------------------- */
        .promo-wrapper {
            display: contents; 
        }

        /* Slide Transition for Images */
        .promo-img-desktop, .promo-img-mobile {
            transition: opacity 0.6s ease-in-out;
            opacity: 1;
        }

        .promo-fade-out {
            opacity: 0;
        }

        /* 1. DEFAULT — 720p monitors & laptops: mobile/horizontal layout */
        .promo-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 700px;
            gap: 1.5rem;
            margin-top: 2rem;
            padding: 0 1rem;
            box-sizing: border-box;
            z-index: 15;
        }

        .promo-banner {
            position: static;
            transform: none;
            width: 100%;
            height: auto; 
            aspect-ratio: 1000 / 360; 
            border: 4px solid var(--border);
            box-shadow: 6px 6px 0 var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            background-color: var(--white);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
        }

        /* Clicks pass through images to the <a> wrapper */
        .promo-banner img {
            pointer-events: none;
        }

        /* On 720p default, show the mobile (horizontal) image */
        .promo-img-desktop { display: none; }

        .promo-img-mobile {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        /* 2. STANDARD DESKTOP (1080p+): switch to fixed vertical side banners */
        @media (min-width: 1400px) and (min-height: 800px) {
            .promo-wrapper {
                display: contents;
            }

            .promo-banner {
                position: fixed;
                top: 50%;
                transform: translateY(-50%);
                width: 120px;
                height: 320px;
                aspect-ratio: auto; 
                border: 5px solid var(--border);
                box-shadow: 10px 10px 0 var(--border);
                cursor: pointer;
                text-decoration: none;
            }

            .left-promo  { left: 2vw; }
            .right-promo { right: 2vw; }

            .promo-img-desktop {
                display: block;
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .promo-img-mobile { display: none; }
        }

        /* 3. LARGE DESKTOP (1920x1080) */
        @media (min-width: 1600px) and (min-height: 900px) {
            .promo-banner {
                width: 180px;
                height: 500px;
            }
        }

        /* 4. ULTRAWIDE & 2K/4K */
        @media (min-width: 2400px) and (min-height: 1300px) {
            .promo-banner {
                width: 360px;
                height: 1000px;
            }
        }

        /* -------------------------------------------
           Fully Optimized Responsive Queries 
        -------------------------------------------- */

        /* 5. TABLET & MOBILE SNAP (Below 1100px) */
        @media (max-width: 1100px) {
            .promo-wrapper {
                display: flex;
                flex-direction: column;
                width: 100%;
                max-width: 700px;
                gap: 1.5rem;
                margin-top: 2rem;
                padding: 0 1rem;
                box-sizing: border-box;
                z-index: 15;
            }

            .promo-banner {
                position: static;
                transform: none;
                width: 100%;
                height: auto; 
                aspect-ratio: 1000 / 360; 
                box-shadow: 6px 6px 0 var(--border);
                border-width: 4px;
            }

            .promo-img-desktop { display: none; }

            .promo-img-mobile {
                display: block;
                width: 100%;
                height: 100%;
                object-fit: contain; 
            }
        }

        @media (max-width: 768px) {
            .atomic-search-container { max-width: 100%; padding: 0 1rem; }
            .atomic-search-bar { height: 65px; }
            .search-icon-box { width: 65px; font-size: 1.5rem; }
            .search-input { font-size: 1.25rem; }
            .attractive-card h3 { font-size: 1.8rem; }
            .card-metadata { flex-direction: column; gap: 10px; }
            
            .deco-floppy { display: none; }
            .deco-code { left: -5%; }
            .deco-terminal { right: -5%; }
        }

        @media (max-width: 580px) {
            .hero { min-height: 75vh; padding: 1.5rem 1rem; }
            .atomic-search-container { gap: 1.5rem; }
            .atomic-logo { max-width: 320px; }
            
            .hero-decorations { display: none; }
            
            .atomic-search-bar { height: 56px; border-width: 4px; box-shadow: 5px 5px 0 var(--border); }
            .search-icon-box { width: 56px; border-right-width: 4px; font-size: 1.2rem; }
            .search-input { font-size: 1.1rem; padding: 0 1rem; }
            
            .atomic-buttons { flex-direction: column; align-items: center; gap: 1rem; }
            .btn-atomic { width: 100%; max-width: 100%; padding: 0.85rem 1.25rem; font-size: 1.1rem; border-width: 4px; box-shadow: 5px 5px 0 var(--border); }
            
            .retro-loader-window { border-width: 4px; box-shadow: 6px 6px 0 var(--border); }
            .retro-header { font-size: 1.1rem; padding: 10px 12px; border-bottom-width: 4px; }
            .retro-body { padding: 1.5rem 1rem; }
            .retro-bar-container { height: 30px; margin-bottom: 1.5rem; margin-right: 15px; border-width: 2px; }
            .retro-cancel { font-size: 1rem; padding: 0.4rem 1.5rem; margin-right: 15px; }
            
            .attractive-card { padding: 0.75rem; border-width: 4px; box-shadow: 6px 6px 0 var(--border); }
            .attractive-card-inner { padding: 1.25rem; border-width: 2px; }
            .attractive-card h3 { font-size: 1.5rem; }
            .attractive-card p { font-size: 1rem; }
            .btn-launch { font-size: 1rem; padding: 1rem; }
            
            .modal-content { padding: 2rem 1.5rem; border-width: 4px; box-shadow: 8px 8px 0 var(--border); }
            .modal-content h3 { font-size: 1.6rem; }
            .modal-content p { font-size: 1rem; }

            .promo-wrapper { margin-top: 1.5rem; }
            .promo-banner { height: auto; aspect-ratio: 1000 / 360; box-shadow: 5px 5px 0 var(--border); } 
        }

        /* YouTube Ribbon Placement & Sizing */
        .yt-ribbon {
            position: fixed;
            z-index: 999;
            top: 30%;
            right: -3px;
            transform: translateY(-50%) scale(0.85); 
            transform-origin: right center;
        }

        .yt-ribbon svg {
            display: block;
            filter: drop-shadow(-6px 6px 0 #000);
        }

        @media (max-width: 580px) {
            .yt-ribbon {
                transform: translateY(-50%) scale(0.60); 
            }

            .atomic-logo { max-width: 280px; width: 90%; } 
        }
    </style>
</head>

    <script>
        // Always start at top of page on reload
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }
        window.scrollTo(0, 0);

        // Loading Screen
        window.addEventListener('load', () => {
            const loader = document.querySelector('.loader-overlay');
            if(loader) {
                setTimeout(() => {
                    loader.classList.add('hidden');
                }, 1200); 
            }
        });

        // Hero Photo Tilt on Scroll
        let photoTilted = false;
        const heroPhoto = document.querySelector('.hero-photo');

        window.addEventListener('scroll', () => {
            if (!photoTilted && window.scrollY > 5) {
                if (heroPhoto) heroPhoto.classList.add('tilted');
                photoTilted = true;
            }
        });

        if(heroPhoto) {
            heroPhoto.addEventListener('mouseenter', () => {
                heroPhoto.classList.remove('tilted');
            });
            heroPhoto.addEventListener('mouseleave', () => {
                if (photoTilted) {
                    heroPhoto.classList.add('tilted');
                }
            });
        }

        // Highlight Parallax Effect
        const highlights = document.querySelectorAll('.highlight');
        const highlightData = new Map();

        highlights.forEach((highlight, index) => {
            const direction = index % 2 === 0 ? 'left' : 'right';
            highlight.setAttribute('data-direction', direction);
            highlightData.set(highlight, {
                hasStarted: false,
                startScroll: 0,
                duration: 100,
                direction: direction
            });
        });

        function updateHighlights() {
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;

            highlights.forEach(highlight => {
                const rect = highlight.getBoundingClientRect();
                const elementTop = rect.top + scrollY;
                const data = highlightData.get(highlight);

                const triggerPoint = scrollY + windowHeight * 0.8;

                if (!data.hasStarted && triggerPoint >= elementTop) {
                    data.hasStarted = true;
                    data.startScroll = scrollY;
                }

                if (data.hasStarted) {
                    const progress = Math.min(1, Math.max(0, (scrollY - data.startScroll) / data.duration));
                    highlight.style.setProperty('--highlight-progress', `${progress * 100}%`);
                }

                if (data.hasStarted && scrollY < data.startScroll - 50) {
                    data.hasStarted = false;
                    highlight.style.setProperty('--highlight-progress', '0%');
                }
            });
        }

        window.addEventListener('scroll', updateHighlights);
        requestAnimationFrame(() => {
            updateHighlights();
        });

        // Theme Toggle
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        if(themeToggle) {
            const icon = themeToggle.querySelector('i');
            const currentTheme = localStorage.getItem('theme') || 'light';
            body.setAttribute('data-theme', currentTheme);
            updateIcon(currentTheme);

            themeToggle.addEventListener('click', () => {
                const theme = body.getAttribute('data-theme');
                const newTheme = theme === 'light' ? 'dark' : 'light';

                body.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateIcon(newTheme);
            });

            function updateIcon(theme) {
                if (theme === 'dark') {
                    icon.classList.remove('fa-moon');
                    icon.classList.add('fa-sun');
                } else {
                    icon.classList.remove('fa-sun');
                    icon.classList.add('fa-moon');
                }
            }
        }

        // Smooth Scroll for Navigation
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const targetId = link.getAttribute('href');
                const targetSection = document.querySelector(targetId);
                if (targetSection) {
                    targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });

        // Smart Navbar Scroll
        const navbar = document.querySelector('.navbar');
        let lastScroll = 0;

        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;

            if (currentScroll > lastScroll && currentScroll > 100) {
                navbar.classList.add('navbar-hidden');
            } else if (currentScroll < lastScroll) {
                navbar.classList.remove('navbar-hidden');
            }

            const sections = document.querySelectorAll('section[id]');
            sections.forEach(section => {
                const sectionTop = section.offsetTop - 100;
                const sectionHeight = section.offsetHeight;
                const sectionId = section.getAttribute('id');

                if (currentScroll >= sectionTop && currentScroll < sectionTop + sectionHeight) {
                    document.querySelectorAll('.nav-link').forEach(link => {
                        link.classList.remove('active');
                        if (link.getAttribute('href') === `#${sectionId}`) {
                            link.classList.add('active');
                        }
                    });
                }
            });

            lastScroll = currentScroll;
        });

        // Intersection Observer for fade-in animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -100px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('fade-in');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.section, .timeline-item, .skill-box').forEach(el => {
            observer.observe(el);
        });

        // Matrix Typing Effect for Hero Greeting
        const greetingElement = document.getElementById('hero-greeting');
        if(greetingElement) {
            const finalText = 'Hi there! 馃憢';
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';

            function matrixTypingEffect() {
                let iterations = 0;
                const interval = setInterval(() => {
                    greetingElement.textContent = finalText
                        .split('')
                        .map((char, index) => {
                            if (index < iterations) {
                                return finalText[index];
                            }
                            if (char === ' ' || char === '馃憢') {
                                return char;
                            }
                            return chars[Math.floor(Math.random() * chars.length)];
                        })
                        .join('');

                    if (iterations >= finalText.length) {
                        clearInterval(interval);
                    }

                    iterations += 1/3;
                }, 50);
            }
            setTimeout(matrixTypingEffect, 500);
        }

        // Progress Bar Functionality
        const progressBarFill = document.querySelector('.progress-bar-fill');
        const checkpoints = document.querySelectorAll('.checkpoint');

        function updateProgressBar() {
            const windowHeight = window.innerHeight;
            const documentHeight = document.documentElement.scrollHeight - windowHeight;
            const scrolled = window.scrollY;
            const progress = (scrolled / documentHeight) * 100;

            if(progressBarFill) progressBarFill.style.width = progress + '%';

        // --- Fisher-Yates shuffle ---
        function shuffleArray(arr) {
            const a = arr.slice();
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

            const isLeft = side === 'left';

            const promo  = pool[idx % pool.length];
